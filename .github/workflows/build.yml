name: build.yml
on:
  workflow_dispatch:
  schedule:
    - cron: "30 3,9,15,21 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set variables
        run: |
          echo "RELEASE_NAME=Released on $(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV

      - name: Check Python tools
        run: |
          set -euo pipefail
          python3 -m py_compile tools/*.py

      - name: Build geodata variants
        run: |
          set -euo pipefail
          python3 tools/build_dat.py --config config/sources.json --output ./publish

      - name: Validate generated assets
        run: |
          set -euo pipefail
          test -s ./publish/geosite.dat
          test -s ./publish/geoip.dat
          test -s ./publish/geosite_categories.txt
          test -s ./publish/geoip_categories.txt
          test -s ./publish/internal/geosite.dat
          test -s ./publish/internal/geoip.dat
          test -s ./publish/small/geosite.dat
          test -s ./publish/small/geoip.dat
          test -s ./publish/full/geosite.dat
          test -s ./publish/full/geoip.dat

          required_geosite=(
            INTERNAL-RU
            INTERNAL-BANK-RU
            INTERNAL-GOV-RU
            INTERNAL-AVAILABLE-ONLY-INSIDE
            INTERNAL-PRIVATE
          )

          required_geoip=(
            INTERNAL-RU
            INTERNAL-RU-WHITELIST
            INTERNAL-YANDEX
            INTERNAL-DDOS-GUARD
            INTERNAL-PRIVATE
          )

          for category in "${required_geosite[@]}"; do
            grep -Fx "$category" ./publish/geosite_categories.txt >/dev/null
          done

          for category in "${required_geoip[@]}"; do
            grep -Fx "$category" ./publish/geoip_categories.txt >/dev/null
          done

          cmp -s ./publish/geosite.dat ./publish/internal/geosite.dat
          cmp -s ./publish/geoip.dat ./publish/internal/geoip.dat

      - name: Release and upload assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
          file_glob: true
          file: ./publish/*

      - name: Git push assets to "release" branch
        run: |
          set -euo pipefail
          cd publish || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "$RELEASE_NAME"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin release
